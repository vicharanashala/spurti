name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install server dependencies
        run: npm install

      - name: Install client dependencies
        run: npm --prefix client install

      - name: Lint server (syntax check)
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Run tests
        run: npm test