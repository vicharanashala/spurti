name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client
        run: npm --prefix client run build

      # Server syntax check (Node.js loads all requires)
      - name: Check server syntax
        run: node --check server/server.js